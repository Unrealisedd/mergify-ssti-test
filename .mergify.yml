pull_request_rules:
  - name: apply-label-from-body
    conditions: [base=main]
    actions:
      label:
        add:
          - "{{ body | get_section(\"## Label\") }}"
  - name: act-on-gated-label
    conditions:
      - label=auto-approved
    actions:
      comment:
        message: |
          PRIV-ESC: body-injected label triggered gated automation
