pull_request_rules:
  - name: yaml-tag-test
    conditions:
      - base=main
      - label=yaml-tag-test
    actions:
      comment:
        message: "test passed"
  - name: merge-on-label (depends-on eval)
    conditions:
      - base=main
      - label=do-merge
    actions:
      merge:
        method: merge
